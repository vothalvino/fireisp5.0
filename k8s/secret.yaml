apiVersion: v1
kind: Secret
metadata:
  name: fireisp-secret
  namespace: fireisp
  labels:
    app.kubernetes.io/name: fireisp
    app.kubernetes.io/component: config
type: Opaque
stringData:
  # IMPORTANT: Replace all placeholder values before deploying.
  # In production, use sealed-secrets, external-secrets, or a vault operator.
  JWT_SECRET: "CHANGE-ME-generate-a-random-64-char-string-for-production-use"
  ENCRYPTION_KEY: "CHANGE-ME-generate-a-random-32-byte-hex-key"
  DB_HOST: "mysql.fireisp.svc.cluster.local"
  DB_PORT: "3306"
  DB_NAME: "fireisp"
  DB_USER: "fireisp"
  DB_PASSWORD: "CHANGE-ME-database-password"
  # Optional: Redis for caching and job queues
  # REDIS_URL: "redis://redis.fireisp.svc.cluster.local:6379"
