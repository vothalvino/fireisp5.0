apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fireisp-storage
  namespace: fireisp
  labels:
    app.kubernetes.io/name: fireisp
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # Uncomment and set your storage class:
  # storageClassName: gp3
