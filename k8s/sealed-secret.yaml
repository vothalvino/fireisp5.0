# =============================================================================
# FireISP 5.0 — Kubernetes Sealed Secret (recommended production pattern)
# =============================================================================
#
# Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets) lets you
# safely commit encrypted secrets to Git. Only the sealed-secrets controller
# running inside the cluster can decrypt them.
#
# ── QUICK START ──────────────────────────────────────────────────────────────
#
# 1. Install the controller once per cluster:
#
#    helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets
#    helm install sealed-secrets sealed-secrets/sealed-secrets \
#      --namespace kube-system \
#      --set fullnameOverride=sealed-secrets-controller
#
# 2. Install the kubeseal CLI (matches controller version):
#
#    KUBESEAL_VERSION=$(kubectl get deployment sealed-secrets-controller \
#      -n kube-system -o jsonpath='{.spec.template.spec.containers[0].image}' \
#      | cut -d: -f2)
#    curl -sSL "https://github.com/bitnami-labs/sealed-secrets/releases/download/${KUBESEAL_VERSION}/kubeseal-${KUBESEAL_VERSION#v}-linux-amd64.tar.gz" \
#      | tar -xz kubeseal && sudo mv kubeseal /usr/local/bin/
#
# 3. Create a plain Secret (NEVER commit this file):
#
#    kubectl create secret generic fireisp-secret \
#      --namespace fireisp \
#      --from-literal=JWT_SECRET="$(openssl rand -base64 48)" \
#      --from-literal=ENCRYPTION_KEY="$(openssl rand -hex 32)" \
#      --from-literal=DB_PASSWORD="$(openssl rand -base64 24)" \
#      --from-literal=DB_ROOT_PASSWORD="$(openssl rand -base64 24)" \
#      --from-literal=SMTP_USER="noreply@example.com" \
#      --from-literal=SMTP_PASS="<smtp-password>" \
#      --from-literal=REDIS_PASSWORD="$(openssl rand -base64 24)" \
#      --dry-run=client -o yaml > /tmp/secret-plain.yaml
#
# 4. Seal it with the cluster's public key:
#
#    kubeseal --controller-namespace kube-system \
#             --controller-name sealed-secrets-controller \
#             --format yaml \
#      < /tmp/secret-plain.yaml > k8s/sealed-secret.yaml
#
#    rm /tmp/secret-plain.yaml   # discard the plaintext
#
# 5. Commit k8s/sealed-secret.yaml to Git — it is safe to do so.
#
# 6. Apply to the cluster:
#
#    kubectl apply -f k8s/namespace.yaml
#    kubectl apply -f k8s/sealed-secret.yaml
#    # The controller automatically decrypts → creates the real Secret.
#
# ── ROTATION ─────────────────────────────────────────────────────────────────
#
# To rotate a secret, repeat steps 3–5 and re-apply. The controller reconciles
# the change and updates the plain Secret; pods pick up the new value on their
# next restart (or via a rolling restart: kubectl rollout restart deploy/fireisp).
#
# ── OFFLINE / AIRGAPPED CLUSTERS ─────────────────────────────────────────────
#
# If you cannot reach the cluster from your CI runner, fetch the public cert
# once and store it in the repo (safe — it's a public key only):
#
#    kubeseal --fetch-cert \
#      --controller-namespace kube-system \
#      --controller-name sealed-secrets-controller \
#      > k8s/sealed-secrets-cert.pem
#
# Then seal without cluster access:
#
#    kubeseal --cert k8s/sealed-secrets-cert.pem \
#             --format yaml \
#      < /tmp/secret-plain.yaml > k8s/sealed-secret.yaml
#
# =============================================================================
#
# The block below is a TEMPLATE — the encryptedData values shown are
# illustrative placeholders. Replace them by running the kubeseal steps above
# against your actual cluster. The real SealedSecret resource will look similar
# but with base64-encoded ciphertext produced by the controller's RSA-OAEP key.
#
# =============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: fireisp-secret
  namespace: fireisp
  annotations:
    # Remove the line below to make this secret namespace-scoped only (safer).
    sealedsecrets.bitnami.com/cluster-wide: "false"
spec:
  # encryptedData keys map 1:1 to the keys of the resulting plain Secret.
  # Every value is RSA-OAEP encrypted with the cluster's public key.
  # Replace each placeholder with the output produced by `kubeseal`.
  encryptedData:
    # Core secrets (required in production — see src/config/index.js validateEnv)
    JWT_SECRET: AgBY...REPLACE_WITH_KUBESEAL_OUTPUT...==
    ENCRYPTION_KEY: AgC3...REPLACE_WITH_KUBESEAL_OUTPUT...==
    DB_PASSWORD: AgCk...REPLACE_WITH_KUBESEAL_OUTPUT...==
    DB_ROOT_PASSWORD: AgAb...REPLACE_WITH_KUBESEAL_OUTPUT...==

    # SMTP credentials
    SMTP_USER: AgBm...REPLACE_WITH_KUBESEAL_OUTPUT...==
    SMTP_PASS: AgDL...REPLACE_WITH_KUBESEAL_OUTPUT...==

    # Redis (required when REDIS_URL is set)
    REDIS_PASSWORD: AgEP...REPLACE_WITH_KUBESEAL_OUTPUT...==

    # MySQL replication (docker-compose.prod.yml / primary+replica setup)
    MYSQL_REPL_PASSWORD: AgFg...REPLACE_WITH_KUBESEAL_OUTPUT...==

    # Payment gateways — include only the ones you use
    # STRIPE_SECRET_KEY: AgGh...REPLACE_WITH_KUBESEAL_OUTPUT...==
    # STRIPE_WEBHOOK_SECRET: AgHi...REPLACE_WITH_KUBESEAL_OUTPUT...==
    # CONEKTA_API_KEY: AgIj...REPLACE_WITH_KUBESEAL_OUTPUT...==
    # CONEKTA_WEBHOOK_KEY: AgJk...REPLACE_WITH_KUBESEAL_OUTPUT...==

    # PAC provider (CFDI 4.0 stamping)
    # PAC_PASSWORD: AgKl...REPLACE_WITH_KUBESEAL_OUTPUT...==

    # SMS / WhatsApp
    # TWILIO_AUTH_TOKEN: AgLm...REPLACE_WITH_KUBESEAL_OUTPUT...==
    # SMS_PROVIDER_API_KEY: AgMn...REPLACE_WITH_KUBESEAL_OUTPUT...==

    # RADIUS shared secret
    # RADIUS_SECRET: AgNo...REPLACE_WITH_KUBESEAL_OUTPUT...==

    # Cloud backup (S3 / Backblaze B2)
    # BACKUP_S3_ACCESS_KEY: AgOp...REPLACE_WITH_KUBESEAL_OUTPUT...==
    # BACKUP_S3_SECRET_KEY: AgPq...REPLACE_WITH_KUBESEAL_OUTPUT...==

    # Cloudflare DNS-01 TLS wildcard certificates
    # CF_API_TOKEN: AgQr...REPLACE_WITH_KUBESEAL_OUTPUT...==

    # Error tracking
    # SENTRY_DSN: AgRs...REPLACE_WITH_KUBESEAL_OUTPUT...==

  template:
    metadata:
      name: fireisp-secret
      namespace: fireisp
      labels:
        app.kubernetes.io/name: fireisp
        app.kubernetes.io/component: config
    type: Opaque
