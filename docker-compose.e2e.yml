# =============================================================================
# FireISP 5.0 — Full-stack E2E test environment
# =============================================================================
# Spins up MySQL and the full production container (Express + bundled React),
# then runs the Playwright smoke test suite against the live stack.
#
# Usage:
#   docker compose -f docker-compose.e2e.yml up --build --abort-on-container-exit
#   docker compose -f docker-compose.e2e.yml down -v
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # MySQL 8.4 — ephemeral, RAM-disk backed for speed
  # ---------------------------------------------------------------------------
  e2e-db:
    image: mysql:8.4.9
    environment:
      MYSQL_ROOT_PASSWORD: e2epassword
      MYSQL_DATABASE: fireisp_e2e
    command: >
      --event-scheduler=ON
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --host-cache-size=0
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 3s
      retries: 12
    tmpfs:
      - /var/lib/mysql

  # ---------------------------------------------------------------------------
  # App — Express API + bundled React SPA (production build)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
    depends_on:
      e2e-db:
        condition: service_healthy
    environment:
      NODE_ENV: test
      PORT: 3000
      DB_HOST: e2e-db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: e2epassword
      DB_NAME: fireisp_e2e
      JWT_SECRET: e2e-test-jwt-secret-for-automated-tests-not-for-production-use!!
      REDIS_URL: ''
      LOG_LEVEL: warn
    # Run migrations and seed before starting the server so Playwright
    # can immediately find the admin user and reference data.
    command: >
      sh -c "node src/scripts/migrate.js && node src/scripts/seed.js && node src/server.js"
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health/live | grep -q ok']
      interval: 5s
      timeout: 5s
      retries: 12

  # ---------------------------------------------------------------------------
  # Playwright — runs the smoke test suite against the live app
  # ---------------------------------------------------------------------------
  playwright:
    image: mcr.microsoft.com/playwright:v1.49.0-jammy
    depends_on:
      app:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      BASE_URL: http://app:3000
      CI: 'true'
    command: >
      sh -c "corepack enable && corepack prepare pnpm@10.33.2 --activate && pnpm install --frozen-lockfile && pnpm --filter fireisp-e2e exec playwright install --with-deps chromium && pnpm --filter fireisp-e2e test"

volumes: {}
