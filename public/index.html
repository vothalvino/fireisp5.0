<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FireISP — Admin Dashboard</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

<!-- ====== Login Screen ====== -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <h1 class="login-logo">🔥 FireISP</h1>
    <p class="login-subtitle">ISP Management Platform</p>
    <form id="login-form" autocomplete="on">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="admin@fireisp.local" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="login-btn">Sign In</button>
      <p id="login-error" class="error-text"></p>
    </form>
  </div>
</div>

<!-- ====== Main App Shell ====== -->
<div id="app-shell" class="app-shell hidden">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>🔥 FireISP</h2>
      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
    </div>
    <nav class="sidebar-nav">
      <a href="#/dashboard" class="nav-link active" data-page="dashboard">📊 Dashboard</a>
      <a href="#/clients" class="nav-link" data-page="clients">👥 Clients</a>
      <a href="#/contracts" class="nav-link" data-page="contracts">📄 Contracts</a>
      <a href="#/plans" class="nav-link" data-page="plans">📦 Plans</a>
      <a href="#/invoices" class="nav-link" data-page="invoices">🧾 Invoices</a>
      <a href="#/payments" class="nav-link" data-page="payments">💳 Payments</a>
      <a href="#/tickets" class="nav-link" data-page="tickets">🎫 Tickets</a>
      <a href="#/devices" class="nav-link" data-page="devices">📡 Devices</a>
      <a href="#/network" class="nav-link" data-page="network">🌐 Network</a>
      <a href="#/users" class="nav-link" data-page="users">🔑 Users</a>
    </nav>
    <div class="sidebar-footer">
      <span id="current-user-name"></span>
      <button class="btn btn-sm" id="logout-btn">Logout</button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content" id="main-content">
    <header class="topbar">
      <button class="sidebar-toggle-mobile" id="sidebar-toggle-mobile" aria-label="Toggle sidebar">☰</button>
      <h1 id="page-title">Dashboard</h1>
      <div class="topbar-right">
        <span id="org-name" class="org-badge"></span>
      </div>
    </header>
    <div class="content-area" id="content-area">
      <!-- Dynamic page content rendered here -->
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/router.js"></script>
<script src="/js/pages.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
