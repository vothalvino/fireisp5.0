apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fireisp.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fireisp.labels" . | nindent 4 }}
    app.kubernetes.io/component: config
data:
  {{- range $key, $val := .Values.config }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
