{{- if .Values.ingress.enabled -}}
{{- $tlsSecretName := .Values.ingress.tls.secretName | default (printf "%s-tls" (include "fireisp.fullname" .)) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "fireisp.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fireisp.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  annotations:
    {{- if .Values.ingress.tls.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.hostname }}
      secretName: {{ $tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.hostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "fireisp.fullname" . }}
                port:
                  name: http
{{- end }}
