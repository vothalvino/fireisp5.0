# Default values for fireisp Helm chart.
# Override these in a values file or with --set flags.

## Number of application replicas.
## Default storage is ReadWriteOnce, so keep one replica unless persistence is
## changed to ReadWriteMany or uploads/generated files move to object storage.
replicaCount: 1

image:
  repository: fireisp/fireisp
  ## Defaults to the chart appVersion when blank.
  tag: ""
  pullPolicy: IfNotPresent

## Optional image pull secrets (e.g. for private registries).
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  ## Set to true to create a ServiceAccount.
  create: false
  name: ""
  annotations: {}

## Pod annotations (e.g. for Prometheus scraping).
podAnnotations: {}

## Pod labels.
podLabels: {}

## Pod-level security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

## Container-level security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

## Rolling-update strategy.
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

terminationGracePeriodSeconds: 30

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  ## Hostname for the Ingress rule.
  hostname: fireisp.example.com
  ## Annotations added to the Ingress resource.
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
  tls:
    enabled: false
    ## Name of the TLS secret. Leave blank to use "<fullname>-tls".
    secretName: ""
    ## cert-manager ClusterIssuer name (adds annotation when set).
    clusterIssuer: ""

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

## Horizontal Pod Autoscaler
hpa:
  ## Enable only with ReadWriteMany storage or external object storage.
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

## Pod Disruption Budget
pdb:
  enabled: true
  minAvailable: 1

## Persistent storage for uploads / generated files.
persistence:
  enabled: true
  size: 10Gi
  ## Leave blank to use the cluster default StorageClass.
  storageClassName: ""
  accessMode: ReadWriteOnce

## Liveness / readiness / startup probes.
livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 12

## Non-secret configuration (rendered into a ConfigMap).
## All values must be strings.
config:
  NODE_ENV: "production"
  PORT: "3000"
  LOG_LEVEL: "info"

  RATE_LIMIT_API: "200"
  RATE_LIMIT_AUTH: "20"
  RATE_LIMIT_EXPORT: "20"
  RATE_LIMIT_SSE: "10"
  RATE_LIMIT_WEBHOOK: "100"

  REQUEST_TIMEOUT_MS: "30000"

  ## Feature flags
  FEATURE_CFDI: "true"
  FEATURE_RADIUS: "true"
  FEATURE_2FA: "true"
  FEATURE_WEBHOOKS: "true"
  FEATURE_SNMP: "true"
  FEATURE_SSO: "false"

  FIRERELAY_MODE: "standalone"

## Secret values (rendered into a Kubernetes Secret).
## In production use Sealed Secrets or External Secrets Operator instead of
## plain values here — see docs/secrets-management.md.
secrets:
  JWT_SECRET: "REPLACEME-generate-a-random-64-char-string"
  ENCRYPTION_KEY: "REPLACEME-generate-a-random-32-byte-hex-key"
  DB_HOST: "mysql.fireisp.svc.cluster.local"
  DB_PORT: "3306"
  DB_NAME: "fireisp"
  DB_USER: "fireisp"
  DB_PASSWORD: "REPLACEME-database-password"

## Prometheus monitoring resources (requires Prometheus Operator CRDs).
monitoring:
  enabled: false

## Sigstore cosign policy (requires policy-controller CRDs).
cosignPolicy:
  enabled: false

## Arbitrary extra environment variables injected into the container.
extraEnv: []
# - name: MY_VAR
#   value: "my-value"

## Extra volumes and volume mounts.
extraVolumes: []
extraVolumeMounts: []

## Node selector, tolerations, and affinity.
nodeSelector: {}
tolerations: []
affinity: {}
