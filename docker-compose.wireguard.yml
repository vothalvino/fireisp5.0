# =============================================================================
# FireISP 5.0 — WireGuard hub activation overlay  (ADDITIVE — edits no base file)
# =============================================================================
# Turns on the WireGuard hub so MikroTik NAS routers AND technician/support/admin
# laptops can dial in, and FireISP routes between them to reach customer devices
# for monitoring + troubleshooting. Layer this ON TOP of the production compose —
# it only ADDS to the `app` service, so DB/Redis/Nginx keep working unchanged:
#
#   docker compose -f docker-compose.prod.yml -f docker-compose.wireguard.yml \
#     --env-file .env.prod up -d
#
# What it adds to `app`:
#   - cap_add: NET_ADMIN + user "0:0"      → may create/manage wg interfaces + nftables
#   - sysctls net.ipv4.ip_forward=1        → route wg-clients ⇄ wg-fireisp
#   - published UDP 51820 (NAS) + 51821 (user clients)  → peers dial in
#   - wg_keys named volume at /etc/wireguard → server keypairs persist across
#     redeploys and NEVER enter git or the image
#   - WG_* env → WG_SERVER_ENABLED=true + the (overridable) endpoint/ports/subnets
#
# The app self-provisions on boot (idempotent): generates the two server keypairs
# if absent, brings up wg-fireisp (10.255.0.1) + wg-clients (10.99.0.1), enables
# IPv4 forwarding, and installs the nftables base. No host `wg-quick` /
# `/etc/wireguard` steps are required — a plain merge → redeploy activates it.
#
# The interfaces live in the app CONTAINER's own network namespace (not the host),
# so inspect them with `docker compose exec app wg show`. All device access is
# through the tunnels, so host networking is NOT needed (and would break the
# bridge service-DNS the rest of the stack relies on).
#
# STILL REQUIRED out-of-band (irreducible for any WireGuard host):
#   1. set WG_ENDPOINT_HOST (your public host/IP) + WG_SERVER_ENABLED=true in .env.prod
#   2. open UDP 51820 + 51821 in the cloud firewall / security group
#   3. the host kernel must have the `wireguard` module (Ubuntu ≥ 5.6 ships it)
#
# Turn it off: redeploy WITHOUT this overlay, or set WG_SERVER_ENABLED=false.
# Always confirm the merge before deploying:
#   docker compose -f docker-compose.prod.yml -f docker-compose.wireguard.yml config
# =============================================================================

services:
  app:
    # CAP_NET_ADMIN (effective) lets the app create wg interfaces + program nftables.
    cap_add:
      - NET_ADMIN
    # NET_ADMIN must be in the EFFECTIVE set; root is the simplest way. Hardened
    # alternative: keep the non-root user and `setcap cap_net_admin+ep` on wg/ip/nft.
    user: "0:0"
    # Route user-tunnel traffic out through the NAS tunnels (set here AND best-effort
    # at runtime). net.ipv4.ip_forward is namespaced, so this scopes to the container.
    sysctls:
      net.ipv4.ip_forward: "1"
    # Peers dial in over UDP. These ADD to the base RADIUS UDP publishes (merged).
    # Host AND container side must track the same var — the app binds wg to this
    # exact port inside the netns, so a host:container port skew would silently
    # drop every handshake.
    ports:
      - '${WG_LISTEN_PORT:-51820}:${WG_LISTEN_PORT:-51820}/udp'              # wg-fireisp — NAS routers
      - '${WG_CLIENT_LISTEN_PORT:-51821}:${WG_CLIENT_LISTEN_PORT:-51821}/udp' # wg-clients — technician/support/admin laptops
    environment:
      WG_SERVER_ENABLED:     "true"
      WG_ENDPOINT_HOST:      ${WG_ENDPOINT_HOST:?set WG_ENDPOINT_HOST to the public host/IP that NAS + clients dial}
      WG_KEY_DIR:            /etc/wireguard
      WG_LISTEN_PORT:        ${WG_LISTEN_PORT:-51820}
      WG_CLIENT_LISTEN_PORT: ${WG_CLIENT_LISTEN_PORT:-51821}
      WG_SERVER_SUBNET:      ${WG_SERVER_SUBNET:-10.255.0.0/16}
      WG_CLIENT_SUBNET:      ${WG_CLIENT_SUBNET:-10.99.0.0/16}
    volumes:
      # Named volume — server private keys persist here across redeploys and never
      # enter git or the image. Merges with the base `storage` mount by target path.
      - wg_keys:/etc/wireguard

volumes:
  wg_keys:
