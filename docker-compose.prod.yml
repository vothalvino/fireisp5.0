# =============================================================================
# FireISP 5.0 — Production docker-compose
# =============================================================================
#
# Services:
#   • db-primary  — MySQL 8.0 write node (with binary log + GTID)
#   • db-replica  — MySQL 8.0 read replica (async streaming replication)
#   • redis       — Redis 7 (AOF persistence, password-protected)
#   • app         — FireISP Node.js API + React SPA (can be scaled with
#                   `docker compose -f docker-compose.prod.yml up --scale app=3`)
#   • nginx       — Nginx reverse proxy (HTTP→HTTPS redirect, TLS, gzip,
#                   rate limiting, WebSocket pass-through for FireRelay)
#
# Prerequisites:
#   1. Copy .env.example → .env.prod and fill ALL required values.
#   2. Place TLS certificates at ./nginx/certs/fullchain.pem and privkey.pem
#      (or mount a Certbot volume — see nginx service comment below).
#   3. Set a strong MYSQL_REPL_PASSWORD in .env.prod.
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#   docker compose -f docker-compose.prod.yml --env-file .env.prod logs -f
#   docker compose -f docker-compose.prod.yml --env-file .env.prod down
#
# Scaling the app tier (load-balanced by Nginx round-robin DNS):
#   docker compose -f docker-compose.prod.yml --env-file .env.prod \
#       up -d --scale app=3 --no-recreate
# =============================================================================

version: '3.8'

# ── Shared defaults ──────────────────────────────────────────────────────────
x-logging: &default-logging
  driver: json-file
  options:
    max-size: '20m'
    max-file: '5'

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  frontend:        # nginx ↔ app
    driver: bridge
  backend:         # app ↔ db-primary, db-replica, redis
    driver: bridge
    internal: true # db and redis are not reachable from outside the host

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  db_primary_data:
  db_replica_data:
  redis_data:
  nginx_certs:
  certbot_www:

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── MySQL primary (write node) ──────────────────────────────────────────────
  db-primary:
    image: mysql:8.0
    restart: unless-stopped
    networks:
      - backend
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
      MYSQL_DATABASE:      ${DB_NAME:-fireisp}
      MYSQL_USER:          ${DB_USER:-fireisp}
      MYSQL_PASSWORD:      ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - db_primary_data:/var/lib/mysql
      - ./mysql/primary.cnf:/etc/mysql/conf.d/primary.cnf:ro
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost',
             '-u', 'root', '--password=${DB_ROOT_PASSWORD}']
      interval: 10s
      timeout:  5s
      retries:  10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus:   '2'
          memory: 1G
        reservations:
          cpus:   '0.5'
          memory: 256M
    logging: *default-logging

  # ── MySQL replica (read node) ───────────────────────────────────────────────
  db-replica:
    image: mysql:8.0
    restart: unless-stopped
    networks:
      - backend
    depends_on:
      db-primary:
        condition: service_healthy
    environment:
      MYSQL_ROOT_PASSWORD:  ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
      MYSQL_DATABASE:       ${DB_NAME:-fireisp}
      MYSQL_USER:           ${DB_USER:-fireisp}
      MYSQL_PASSWORD:       ${DB_PASSWORD:?DB_PASSWORD is required}
      # Replication credentials
      MYSQL_REPL_USER:      ${MYSQL_REPL_USER:-repl_user}
      MYSQL_REPL_PASSWORD:  ${MYSQL_REPL_PASSWORD:?MYSQL_REPL_PASSWORD is required}
    volumes:
      - db_replica_data:/var/lib/mysql
      - ./mysql/replica.cnf:/etc/mysql/conf.d/replica.cnf:ro
      - ./mysql/init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh:ro
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost',
             '-u', 'root', '--password=${DB_ROOT_PASSWORD}']
      interval: 10s
      timeout:  5s
      retries:  10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus:   '2'
          memory: 1G
        reservations:
          cpus:   '0.25'
          memory: 256M
    logging: *default-logging

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - backend
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
        --appendonly yes
        --appendfsync everysec
        --maxmemory ${REDIS_MAXMEMORY:-256mb}
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --save 60 10000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout:  5s
      retries:  5
    deploy:
      resources:
        limits:
          cpus:   '0.5'
          memory: 512M
        reservations:
          cpus:   '0.1'
          memory: 64M
    logging: *default-logging

  # ── FireISP application ───────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - frontend
      - backend
    depends_on:
      db-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      NODE_ENV:   production
      DB_HOST:    db-primary
      DB_PORT:    3306
      REDIS_URL:  redis://:${REDIS_PASSWORD}@redis:6379
    volumes:
      - ./storage:/app/storage
    # Do NOT publish port 3000 to the host — only Nginx reaches the app.
    expose:
      - '3000'
    deploy:
      replicas: 1          # increase with --scale app=N as traffic grows
      resources:
        limits:
          cpus:   '1'
          memory: 512M
        reservations:
          cpus:   '0.25'
          memory: 128M
    logging: *default-logging

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    networks:
      - frontend
    depends_on:
      - app
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # TLS certificates — mount your own or use a Certbot companion:
      #   Option A (manual): place fullchain.pem + privkey.pem in ./nginx/certs/
      #   Option B (Certbot): mount the Certbot live dir into nginx_certs and
      #                        adjust ssl_certificate paths in nginx.conf
      - ./nginx/certs:/etc/nginx/certs:ro
      # Certbot ACME challenge web-root (for Let's Encrypt renewals)
      - certbot_www:/var/www/certbot:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost/healthz || exit 1']
      interval: 15s
      timeout:  5s
      retries:  3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus:   '0.5'
          memory: 128M
        reservations:
          cpus:   '0.1'
          memory: 32M
    logging: *default-logging
