# =============================================================================
# FireISP 5.0 — Production docker-compose
# =============================================================================
#
# Services:
#   • db-primary  — MySQL 8.4 write node (with binary log + GTID)
#   • db-replica  — MySQL 8.4 read replica (async streaming replication)
#   • redis       — Redis 7 (AOF persistence, password-protected)
#   • app         — FireISP Node.js API + React SPA (can be scaled with
#                   `docker compose -f docker-compose.prod.yml up --scale app=3`)
#   • nginx       — Nginx reverse proxy (HTTP→HTTPS redirect, TLS, gzip,
#                   rate limiting, WebSocket pass-through for FireRelay)
#
# Prerequisites:
#   1. Copy .env.prod.example → .env.prod and fill ALL required values.
#   2. Place TLS certificates at ./nginx/certs/fullchain.pem and privkey.pem
#      (or mount a Certbot volume — see nginx service comment below).
#   3. Set a strong MYSQL_REPL_PASSWORD in .env.prod.
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#   docker compose -f docker-compose.prod.yml --env-file .env.prod logs -f
#   docker compose -f docker-compose.prod.yml --env-file .env.prod down
#
# Scaling the app tier (load-balanced by Nginx round-robin DNS):
#   docker compose -f docker-compose.prod.yml --env-file .env.prod \
#       up -d --scale app=3 --no-recreate
# =============================================================================

# ── Shared defaults ──────────────────────────────────────────────────────────
x-logging: &default-logging
  driver: json-file
  options:
    max-size: '20m'
    max-file: '5'

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  frontend:        # nginx ↔ app
    driver: bridge
  backend:         # app ↔ db-primary, db-replica, redis
    driver: bridge
    internal: true # db and redis are not reachable from outside the host

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  storage:          # client/device/ticket document uploads (/app/storage)
  wg_keys:          # WireGuard server keypairs (persist across redeploys; never in git)
  db_primary_data:
  db_replica_data:
  redis_data:
  nginx_certs:
  certbot_www:
  chroma_data:

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── MySQL primary (write node) ──────────────────────────────────────────────
  db-primary:
    image: mysql:8.4.9
    restart: unless-stopped
    networks:
      - backend
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
      MYSQL_DATABASE:      ${DB_NAME:-fireisp}
      MYSQL_USER:          ${DB_USER:-fireisp}
      MYSQL_PASSWORD:      ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - db_primary_data:/var/lib/mysql
      - ./mysql/primary.cnf:/etc/mysql/conf.d/primary.cnf:ro
    command: mysqld --host-cache-size=0
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost',
             '-u', 'root', '--password=${DB_ROOT_PASSWORD}']
      interval: 10s
      timeout:  5s
      retries:  10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus:   '2'
          memory: 1G
        reservations:
          cpus:   '0.5'
          memory: 256M
    logging: *default-logging

  # ── MySQL replica (read node) ───────────────────────────────────────────────
  db-replica:
    image: mysql:8.4.9
    restart: unless-stopped
    networks:
      - backend
    depends_on:
      db-primary:
        condition: service_healthy
    environment:
      MYSQL_ROOT_PASSWORD:  ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
      MYSQL_DATABASE:       ${DB_NAME:-fireisp}
      MYSQL_USER:           ${DB_USER:-fireisp}
      MYSQL_PASSWORD:       ${DB_PASSWORD:?DB_PASSWORD is required}
      # Replication credentials
      MYSQL_REPL_USER:      ${MYSQL_REPL_USER:-repl_user}
      MYSQL_REPL_PASSWORD:  ${MYSQL_REPL_PASSWORD:?MYSQL_REPL_PASSWORD is required}
    volumes:
      - db_replica_data:/var/lib/mysql
      - ./mysql/replica.cnf:/etc/mysql/conf.d/replica.cnf:ro
      - ./mysql/init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh:ro
    command: mysqld --host-cache-size=0
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost',
             '-u', 'root', '--password=${DB_ROOT_PASSWORD}']
      interval: 10s
      timeout:  5s
      retries:  10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus:   '2'
          memory: 1G
        reservations:
          cpus:   '0.25'
          memory: 256M
    logging: *default-logging

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - backend
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
        --appendonly yes
        --appendfsync everysec
        --maxmemory ${REDIS_MAXMEMORY:-256mb}
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --save 60 10000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout:  5s
      retries:  5
    deploy:
      resources:
        limits:
          cpus:   '0.5'
          memory: 512M
        reservations:
          cpus:   '0.1'
          memory: 64M
    logging: *default-logging

  # ── FireISP application ───────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # WireGuard hub (ON by default in prod; endpoint derives from DOMAIN; set
    # WG_SERVER_ENABLED=false in .env.prod to opt out):
    #   - cap_add NET_ADMIN puts the capability in the bounding set, and
    #   - user "0:0" runs the app as root — kernel WireGuard interface + route
    #     management (`ip link add type wireguard`, `ip address add`, `ip route`)
    #     requires REAL uid 0; CAP_NET_ADMIN via file-caps is sufficient for wg/nft
    #     but NOT for those rtnetlink ops. Dev/test/e2e keep the image's non-root
    #     `fireisp` user (they don't set `user:` and don't enable WG).
    #   - sysctls enables IPv4 forwarding for wg-clients <-> wg-fireisp routing.
    cap_add:
      - NET_ADMIN
    user: "0:0"
    sysctls:
      net.ipv4.ip_forward: '1'
    networks:
      - frontend
      - backend
    depends_on:
      db-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      NODE_ENV:   production
      DB_HOST:    db-primary
      DB_PORT:    3306
      REDIS_URL:  redis://:${REDIS_PASSWORD}@redis:6379
      # Embedded RADIUS server (FireISP is the RADIUS server — docs/radius-server.md).
      # Defaults ON in production; set RADIUS_SERVER_ENABLED=false in .env.prod to disable.
      RADIUS_SERVER_ENABLED: ${RADIUS_SERVER_ENABLED:-true}
      RADIUS_AUTH_PORT:      ${RADIUS_AUTH_PORT:-1812}
      RADIUS_ACCT_PORT:      ${RADIUS_ACCT_PORT:-1813}
      RADIUS_SERVER_SECRET:  ${RADIUS_SERVER_SECRET:-}
      # WireGuard hub — ON by default in production; the dial-in endpoint auto-derives
      # from DOMAIN (the TLS host), so a normal redeploy activates it with no extra
      # config. Opt out by setting WG_SERVER_ENABLED=false in .env.prod.
      WG_SERVER_ENABLED:     ${WG_SERVER_ENABLED:-true}
      WG_KEY_DIR:            /etc/wireguard
    volumes:
      # Named volume, NOT a host bind mount: the previous `./storage` bind mount
      # was root-owned on the host, so the non-root `fireisp` container user hit
      # EACCES writing uploads. A named volume inherits the image's fireisp-owned
      # /app/storage on first init, so it is writable by the app.
      - storage:/app/storage
      # Server WireGuard keypairs — generated on first boot, persist here, never in git/image.
      - wg_keys:/etc/wireguard
    # HTTP (3000) stays internal behind Nginx. The RADIUS auth/accounting
    # listeners are UDP and must be published directly (Nginx proxies HTTP only).
    # NOTE: these are fixed host ports — keep the app at replicas:1, or front
    # RADIUS with a UDP load balancer, if you scale the app tier (--scale app=N).
    expose:
      - '3000'
    ports:
      - '${RADIUS_AUTH_PORT:-1812}:1812/udp'
      - '${RADIUS_ACCT_PORT:-1813}:1813/udp'
      # WireGuard dial-in (host:container kept identical so the app's bind port always
      # matches the published port). Inert until WG_SERVER_ENABLED=true.
      - '${WG_LISTEN_PORT:-51820}:${WG_LISTEN_PORT:-51820}/udp'
      - '${WG_CLIENT_LISTEN_PORT:-51821}:${WG_CLIENT_LISTEN_PORT:-51821}/udp'
    deploy:
      replicas: 1          # increase with --scale app=N as traffic grows
      resources:
        limits:
          cpus:   '1'
          memory: 512M
        reservations:
          cpus:   '0.25'
          memory: 128M
    logging: *default-logging

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    networks:
      - frontend
    depends_on:
      - app
    ports:
      - '80:80'
      - '443:443'
    # On startup: auto-generate a self-signed certificate when no real TLS
    # certificate is present yet (e.g. before init-letsencrypt.sh has been
    # run).  This lets nginx bind on port 80 immediately so the container is
    # healthy and can serve the Let's Encrypt ACME HTTP-01 challenge.
    # The self-signed cert is overwritten by init-letsencrypt.sh / certbot.
    # Reload nginx every 6 hours so it picks up renewed TLS certificates
    # without requiring a container restart. Let's Encrypt renews ~30 days
    # before expiry; the 6-hour window guarantees fresh certs within hours.
    command:
      - /bin/sh
      - -c
      - |
          if [ ! -f /etc/nginx/certs/fullchain.pem ] || [ ! -f /etc/nginx/certs/privkey.pem ]; then
            mkdir -p /etc/nginx/certs;
            # nginx:alpine ships the OpenSSL libraries but not the openssl CLI.
            # Install it transiently (apk cache is discarded after this container
            # restarts, keeping the image immutable).
            if ! command -v openssl >/dev/null 2>&1; then
              apk add --no-cache openssl >/dev/null;
            fi;
            openssl req -x509 -nodes -newkey rsa:2048 -days 3650 \
              -keyout /etc/nginx/certs/privkey.pem \
              -out    /etc/nginx/certs/fullchain.pem \
              -subj   /CN=localhost 2>/dev/null; # bootstrap-only; replaced by init-letsencrypt.sh
            echo "[nginx] Self-signed cert created. Run nginx/init-letsencrypt.sh for a real cert.";
          fi;
          while :; do sleep 6h & wait $${!}; nginx -s reload; done &
          exec nginx -g "daemon off;"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # TLS certificates directory — populated by:
      #   • The startup command above (temporary self-signed cert when missing)
      #   • init-letsencrypt.sh   (first-time real certificate bootstrap)
      #   • certbot-deploy-hook.sh (automatic renewal copy)
      #   • Manual: place fullchain.pem + privkey.pem here directly
      # Not mounted read-only so the startup command can write the initial
      # self-signed certificate when no real certificate is present yet.
      - ./nginx/certs:/etc/nginx/certs
      # Certbot ACME challenge web-root (HTTP-01 challenge)
      - certbot_www:/var/www/certbot:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost/healthz || exit 1']
      interval: 15s
      timeout:  5s
      retries:  3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus:   '0.5'
          memory: 128M
        reservations:
          cpus:   '0.1'
          memory: 32M
    logging: *default-logging

  # ── ChromaDB vector store (optional — enable with --profile rag) ─────────
  chromadb:
    image: chromadb/chroma:1.0.4
    profiles: ['rag']
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: 'TRUE'
      ANONYMIZED_TELEMETRY: 'FALSE'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8000/api/v1/heartbeat || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging: *default-logging
  # This service checks for certificate renewal every 12 hours.
  # Let's Encrypt renews certs that are within 30 days of expiry.
  #
  # First-time setup: run nginx/init-letsencrypt.sh instead of starting
  # this service directly — it handles the chicken-and-egg bootstrapping.
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    # Renewal loop: check every 12 hours. certbot renew is a no-op when
    # the certificate is not yet due for renewal (< 30 days to expiry).
    entrypoint: >
      /bin/sh -c
      'trap exit TERM;
       while :; do
         certbot renew --quiet;
         sleep 12h & wait $${!};
       done'
    volumes:
      # Let's Encrypt config + issued certificates (local bind-mount so the
      # directory is visible on the host and easy to inspect/backup)
      - ./nginx/letsencrypt:/etc/letsencrypt
      # HTTP-01 ACME challenge web-root (shared with nginx)
      - certbot_www:/var/www/certbot
      # Shared certs dir: deploy hook copies renewed certs here so nginx
      # can read them without mounting the full /etc/letsencrypt tree
      - ./nginx/certs:/certs
      # Deploy hook: runs automatically on successful renewal
      - ./nginx/certbot-deploy-hook.sh:/etc/letsencrypt/renewal-hooks/deploy/copy-certs.sh:ro
    logging: *default-logging
