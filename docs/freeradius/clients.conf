# =============================================================================
# FreeRADIUS clients.conf — NAS client secrets from FireISP
# =============================================================================
# NAS client secrets are stored in the FireISP `nas` table (see database/schema.sql).
# This file shows a static example snippet; for production deployments, generate
# this file from the database using the SQL query below.
#
# --- Generate clients.conf from FireISP MySQL ---
#
#   mysql -u YOUR_DB_USER -p YOUR_DB_NAME -e "
#     SELECT CONCAT(
#       'client ', COALESCE(ip_address, name), ' {\n',
#       '  secret     = ', IFNULL(secret, 'changeme'), '\n',
#       '  shortname  = ', name, '\n',
#       '  nas_type   = ', IFNULL(type, 'other'), '\n',
#       '}\n'
#     )
#     FROM nas
#     WHERE organization_id = YOUR_ORG_ID
#       AND deleted_at IS NULL;
#   " --skip-column-names
#
# Pipe the output to /etc/freeradius/3.0/clients.conf, or maintain a cron job
# that regenerates the file whenever the nas table changes.
# A future FireISP task (clients_conf_export) may automate this.
# =============================================================================

# ---------------------------------------------------------------------------
# Example NAS entry (replace with real values from your environment)
# ---------------------------------------------------------------------------
client 10.0.0.1 {
    secret      = YOUR_NAS_SECRET   # must match nas.secret in FireISP
    shortname   = "Core-Router-01"
    nas_type    = "cisco"           # or mikrotik, juniper, other
}

# ---------------------------------------------------------------------------
# Example MikroTik BNG
# ---------------------------------------------------------------------------
client 10.0.0.2 {
    secret      = YOUR_NAS_SECRET_2
    shortname   = "MikroTik-BNG-01"
    nas_type    = "mikrotik"
}

# ---------------------------------------------------------------------------
# Localhost — for testing with radtest
# ---------------------------------------------------------------------------
client 127.0.0.1 {
    secret      = testing123
    shortname   = "localhost"
    nas_type    = "other"
}
