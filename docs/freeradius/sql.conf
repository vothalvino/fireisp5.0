# =============================================================================
# FreeRADIUS 3.x — SQL module configuration for FireISP
# =============================================================================
# Copy this file to /etc/freeradius/3.0/mods-available/sql
# Then symlink: ln -s ../mods-available/sql mods-enabled/sql
#
# This configures rlm_sql to read the standard FreeRADIUS tables that FireISP
# populates via the radius_sync task:
#   radcheck        — per-user check attributes (Cleartext-Password, Auth-Type, TLS-Cert-Serial)
#   radreply        — per-user reply attributes
#   radusergroup    — user → group membership
#   radgroupcheck   — per-group check attributes
#   radgroupreply   — per-group reply attributes (speed limits, QoS)
#   radacct         — accounting (not managed by FireISP; FreeRADIUS writes here)
# =============================================================================

sql {
    # ---------------------------------------------------------------------------
    # Database dialect and driver
    # ---------------------------------------------------------------------------
    dialect = "mysql"
    driver = "rlm_sql_${dialect}"

    # ---------------------------------------------------------------------------
    # Connection settings — replace YOUR_* with FireISP database credentials
    # ---------------------------------------------------------------------------
    server   = "YOUR_DB_HOST"   # e.g. 127.0.0.1 or db.yourorg.internal
    port     = 3306
    login    = "YOUR_DB_USER"   # a read-only user is sufficient for auth queries
    password = "YOUR_DB_PASS"
    radius_db = "YOUR_DB_NAME"  # FireISP database name

    # ---------------------------------------------------------------------------
    # Connection pool — tune to match your subscriber concurrency
    # ---------------------------------------------------------------------------
    pool {
        start    = 5
        min      = 3
        max      = 32
        spare    = 3
        uses     = 0
        lifetime = 0
        idle_timeout = 60
    }

    # ---------------------------------------------------------------------------
    # Table names — must match what FireISP migrations create
    # ---------------------------------------------------------------------------
    authcheck_table  = "radcheck"
    authreply_table  = "radreply"
    groupcheck_table = "radgroupcheck"
    groupreply_table = "radgroupreply"
    usergroup_table  = "radusergroup"
    # acct_table1 and acct_table2 are for RADIUS accounting (optional)
    acct_table1      = "radacct"
    acct_table2      = "radacct"

    # ---------------------------------------------------------------------------
    # Use the default SQL queries (reads username/attribute/op/value columns).
    # The standard column layout that FireISP uses matches FreeRADIUS defaults.
    # ---------------------------------------------------------------------------
    # read_groups = yes
    # read_profiles = no

    # ---------------------------------------------------------------------------
    # Accounting — if you want FreeRADIUS to write session records into radacct
    # (separate from FireISP's connection_logs which are written by the
    # accounting proxy or NAS-facing listener), create a radacct table:
    #
    # CREATE TABLE IF NOT EXISTS radacct (
    #     radacctid          BIGINT UNSIGNED NOT NULL AUTO_INCREMENT,
    #     acctsessionid      VARCHAR(64)  NOT NULL DEFAULT '',
    #     acctuniqueid       VARCHAR(32)  NOT NULL DEFAULT '',
    #     username           VARCHAR(64)  NOT NULL DEFAULT '',
    #     realm              VARCHAR(64)  DEFAULT '',
    #     nasipaddress       VARCHAR(15)  NOT NULL DEFAULT '',
    #     nasportid          VARCHAR(15)  DEFAULT NULL,
    #     nasporttype        VARCHAR(32)  DEFAULT NULL,
    #     acctstarttime      DATETIME     DEFAULT NULL,
    #     acctstoptime       DATETIME     DEFAULT NULL,
    #     acctsessiontime    INT UNSIGNED DEFAULT NULL,
    #     acctauthentic      VARCHAR(32)  DEFAULT NULL,
    #     acctinputoctets    BIGINT       DEFAULT NULL,
    #     acctoutputoctets   BIGINT       DEFAULT NULL,
    #     calledstationid    VARCHAR(50)  NOT NULL DEFAULT '',
    #     callingstationid   VARCHAR(50)  NOT NULL DEFAULT '',
    #     acctterminatecause VARCHAR(32)  NOT NULL DEFAULT '',
    #     servicetype        VARCHAR(32)  DEFAULT NULL,
    #     framedprotocol     VARCHAR(32)  DEFAULT NULL,
    #     framedipaddress    VARCHAR(15)  NOT NULL DEFAULT '',
    #     framedipv6address  VARCHAR(45)  NOT NULL DEFAULT '',
    #     framedipv6prefix   VARCHAR(45)  NOT NULL DEFAULT '',
    #     framedinterfaceid  VARCHAR(44)  NOT NULL DEFAULT '',
    #     delegatedipv6prefix VARCHAR(45) NOT NULL DEFAULT '',
    #     acctstartdelay     INT          DEFAULT NULL,
    #     acctexpiry         INT          DEFAULT NULL,
    #     connectinfo_start  VARCHAR(50)  DEFAULT NULL,
    #     connectinfo_stop   VARCHAR(50)  DEFAULT NULL,
    #     PRIMARY KEY (radacctid),
    #     UNIQUE KEY acctuniqueid (acctuniqueid),
    #     KEY nasipaddress (nasipaddress, acctstarttime),
    #     KEY framedipaddress (framedipaddress),
    #     KEY acctsessionid (acctsessionid),
    #     KEY acctstarttime (acctstarttime),
    #     KEY acctinterval (acctstarttime, acctstoptime),
    #     KEY username (username)
    # ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;
    # ---------------------------------------------------------------------------

    # ---------------------------------------------------------------------------
    # EAP-TLS note:
    # For EAP-TLS, also configure mods-available/eap with a tls { ... } section
    # pointing to your CA certificate, server certificate, and private key.
    # FireISP stores certificate serial numbers in subscriber_certificates;
    # the radcheck TLS-Cert-Serial == <serial> row enforces certificate binding
    # at the FreeRADIUS layer.
    #
    # Example eap.conf snippet (mods-available/eap):
    #   eap {
    #     default_eap_type = tls
    #     tls-config tls-common {
    #       private_key_password = YOUR_KEY_PASS
    #       private_key_file = ${certdir}/server.key
    #       certificate_file = ${certdir}/server.pem
    #       ca_file = ${cadir}/ca.pem
    #       check_cert_cn = %{User-Name}   # match CN to RADIUS username
    #     }
    #     tls { tls = tls-common }
    #   }
    # ---------------------------------------------------------------------------
}
