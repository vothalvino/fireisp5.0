<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1280 720">
  <title id="title">FireISP Data Migration Flow video walkthrough</title>
  <desc id="desc">Animated six-scene walkthrough covering backup, CSV preparation, ordered imports, row-level errors, verification, and rollback readiness.</desc>
  <style>
    svg { font-family: Inter, "Segoe UI", Arial, sans-serif; background: #07111f; }
    .brand { fill: #ff7a18; font-weight: 800; letter-spacing: 1px; }
    .muted { fill: #9fb2cc; font-size: 28px; }
    .title { fill: #f8fbff; font-size: 56px; font-weight: 800; }
    .body { fill: #dce8f8; font-size: 34px; font-weight: 600; }
    .small { fill: #c8d7ea; font-size: 25px; }
    .code { fill: #c7f9cc; font: 24px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .panel { fill: #0f2035; stroke: #24496f; stroke-width: 3; rx: 24; }
    .accent { fill: #22c55e; }
    .warn { fill: #facc15; }
    .scene { opacity: 0; }
    #s1 { animation: show1 48s infinite; }
    #s2 { animation: show2 48s infinite; }
    #s3 { animation: show3 48s infinite; }
    #s4 { animation: show4 48s infinite; }
    #s5 { animation: show5 48s infinite; }
    #s6 { animation: show6 48s infinite; }
    #progress { animation: progress 48s linear infinite; transform-origin: 120px 662px; }
    @keyframes show1 { 0%,15%{opacity:1} 16%,100%{opacity:0} }
    @keyframes show2 { 0%,15%{opacity:0} 16%,31%{opacity:1} 32%,100%{opacity:0} }
    @keyframes show3 { 0%,31%{opacity:0} 32%,47%{opacity:1} 48%,100%{opacity:0} }
    @keyframes show4 { 0%,47%{opacity:0} 48%,63%{opacity:1} 64%,100%{opacity:0} }
    @keyframes show5 { 0%,63%{opacity:0} 64%,79%{opacity:1} 80%,100%{opacity:0} }
    @keyframes show6 { 0%,79%{opacity:0} 80%,100%{opacity:1} }
    @keyframes progress { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  </style>
  <rect width="1280" height="720" fill="#07111f"/>
  <text x="64" y="74" class="brand">FIREISP 5.0</text>
  <text x="64" y="118" class="muted">Production docs walkthrough</text>
  <rect x="64" y="640" width="1152" height="44" rx="22" fill="#0f2035" stroke="#24496f" stroke-width="2"/>
  <rect id="progress" x="120" y="662" width="1040" height="8" rx="4" fill="#ff7a18"/>

  <g id="s1" class="scene">
    <text x="64" y="196" class="title">Data migration: start safe</text>
    <text x="64" y="260" class="body">Prepare FireISP before importing production records.</text>
    <rect x="690" y="168" width="470" height="330" class="panel"/>
    <text x="730" y="230" class="small">✓ Migrations applied</text>
    <text x="730" y="282" class="small">✓ Organization exists</text>
    <text x="730" y="334" class="small">✓ Admin token available</text>
    <text x="730" y="386" class="small">✓ Plans and sites created</text>
    <text x="730" y="438" class="small">✓ Backup captured</text>
    <circle cx="256" cy="400" r="94" fill="#122a44" stroke="#22c55e" stroke-width="8"/>
    <text x="210" y="414" class="body">1</text>
  </g>

  <g id="s2" class="scene">
    <text x="64" y="196" class="title">Prepare clean CSV inputs</text>
    <text x="64" y="260" class="body">Normalize encoding, dates, and required columns first.</text>
    <rect x="88" y="310" width="1090" height="270" class="panel"/>
    <text x="130" y="365" class="code">clients.csv</text>
    <text x="420" y="365" class="code">devices.csv</text>
    <text x="710" y="365" class="code">contracts.csv</text>
    <text x="130" y="425" class="code">invoices.csv</text>
    <text x="420" y="425" class="code">payments.csv</text>
    <text x="130" y="498" class="small">UTF-8 • YYYY-MM-DD • API limits: 10 MiB and 10,000 rows</text>
  </g>

  <g id="s3" class="scene">
    <text x="64" y="196" class="title">Import in dependency order</text>
    <text x="64" y="260" class="body">Clients → Devices → Contracts → Invoices → Payments</text>
    <rect x="95" y="330" width="1090" height="150" class="panel"/>
    <text x="135" y="386" class="code">curl -X POST /api/import/clients/upload \</text>
    <text x="135" y="428" class="code">  -H "Authorization: Bearer &lt;token&gt;" -H "X-Org-Id: &lt;org_id&gt;"</text>
  </g>

  <g id="s4" class="scene">
    <text x="64" y="196" class="title">Fix row-level errors only</text>
    <text x="64" y="260" class="body">Successful rows stay imported; correct and re-run failures.</text>
    <rect x="170" y="324" width="940" height="210" class="panel"/>
    <text x="220" y="382" class="code">{ "imported": 150, "total": 152,</text>
    <text x="220" y="426" class="code">  "errors": [{ "row": 23,</text>
    <text x="220" y="470" class="code">  "error": "first_name and last_name are required" }] }</text>
  </g>

  <g id="s5" class="scene">
    <text x="64" y="196" class="title">Verify before sign-off</text>
    <text x="64" y="260" class="body">Compare FireISP with the source system.</text>
    <rect x="160" y="316" width="960" height="245" class="panel"/>
    <text x="210" y="374" class="small">✓ Row counts match source</text>
    <text x="210" y="424" class="small">✓ Invoice and payment totals match</text>
    <text x="210" y="474" class="small">✓ No orphaned contracts or payment links</text>
    <text x="210" y="524" class="small">✓ Known customers spot-checked</text>
  </g>

  <g id="s6" class="scene">
    <text x="64" y="196" class="title">Keep rollback ready</text>
    <text x="64" y="260" class="body">Hold the backup until business sign-off is complete.</text>
    <rect x="170" y="305" width="940" height="260" class="panel"/>
    <text x="220" y="360" class="small">✓ Backup filename recorded</text>
    <text x="220" y="410" class="code">gunzip &lt; storage/backups/fireisp_*.sql.gz | mysql fireisp</text>
    <text x="220" y="460" class="small">✓ Event scheduler re-enabled after restore</text>
    <text x="220" y="510" class="small">✓ Production sign-off captured</text>
  </g>
</svg>
