# =============================================================================
# FireISP 5.0 — Nginx BOOTSTRAP Configuration
#
# Used ONLY by nginx/init-letsencrypt.sh for first-time TLS provisioning.
#
# Why a separate config?
#   The production config (nginx/nginx.conf) declares
#     upstream app { server app:3000; ... }
#   Open-source nginx resolves every hostname in an upstream{} block at
#   startup. During TLS bootstrap we run nginx with `--no-deps`, so the
#   `app` container is not running and Docker's embedded DNS cannot resolve
#   `app`. Nginx then aborts with:
#     [emerg] host not found in upstream "app:3000"
#   which surfaces as the misleading
#     [ERROR] nginx failed to start — check nginx.conf for syntax errors.
#
# This minimal config:
#   • Listens only on port 80
#   • Serves the ACME HTTP-01 challenge from /var/www/certbot
#   • Returns 404 for everything else
#   • Has NO upstream{} block and NO TLS server, so it starts without
#     the app container and without any TLS certificates being present.
#
# init-letsencrypt.sh swaps this config in, issues the certificate, then
# swaps the production nginx.conf back and reloads.
# =============================================================================

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
    server_tokens off;

    server {
        listen      80 default_server;
        listen      [::]:80 default_server;
        server_name _;

        # Let's Encrypt / Certbot ACME HTTP-01 challenge.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Anything else during bootstrap is intentionally rejected so we
        # cannot accidentally proxy real traffic through this stripped-down
        # configuration.
        location / {
            return 404;
        }
    }
}
