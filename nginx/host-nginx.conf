# =============================================================================
# FireISP 5.0 — Host-Nginx Configuration
# =============================================================================
#
# Used when the host-level (system) Nginx acts as the TLS front-door instead
# of the bundled Docker nginx container.  This is the correct deployment model
# when another service already binds port 80 on the host, or when you prefer
# to manage TLS at the OS level.
#
# Topology:
#   Internet → Host Nginx :80/:443 → 127.0.0.1:8080 (Docker app container)
#
# Placeholders — replaced by install.sh before this file is placed in
#   /etc/nginx/sites-available/fireisp:
#   __INSTALL_DIR__  Full path to the FireISP installation directory
#                    (e.g. /opt/fireisp)
#
# To apply changes after manual edits:
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# ── Worker / event model ─────────────────────────────────────────────────────
worker_processes      auto;
worker_rlimit_nofile  65535;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

# ── HTTP block ───────────────────────────────────────────────────────────────
http {
    # ── MIME types ────────────────────────────────────────────────────────────
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/fireisp-access.log main;
    error_log  /var/log/nginx/fireisp-error.log  warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  1000;
    types_hash_max_size 4096;
    server_tokens       off;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/x-font-ttf image/svg+xml;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # General API: 60 req/s per IP (burst of 120, no delay up to 60)
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;
    # Auth endpoints: 10 req/s per IP
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;
    limit_req_status 429;

    # ── App upstream (Docker container exposed on loopback) ───────────────────
    upstream app {
        # FireISP app container, published on loopback by docker-compose.host-nginx.yml.
        # If you changed the host port from the default 8080, update this line.
        server 127.0.0.1:8080;

        keepalive            32;
        keepalive_timeout    60s;
        keepalive_requests   1000;
    }

    # ── HTTP → HTTPS redirect + ACME challenge ────────────────────────────────
    server {
        listen      80;
        listen      [::]:80;
        server_name _;

        # Let's Encrypt / Certbot ACME HTTP-01 challenge.
        # certbot (Docker) writes challenge files to ./nginx/certbot-www via
        # the bind-mount in docker-compose.host-nginx.yml.
        location /.well-known/acme-challenge/ {
            root __INSTALL_DIR__/nginx/certbot-www;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS virtual host ────────────────────────────────────────────────────
    server {
        listen      443 ssl http2;
        listen      [::]:443 ssl http2;
        server_name _;

        # ── TLS certificates ──────────────────────────────────────────────────
        # Populated by nginx/init-letsencrypt.sh (first-time bootstrap) and
        # kept current by the certbot-deploy-hook.sh (automatic renewals).
        ssl_certificate     __INSTALL_DIR__/nginx/certs/fullchain.pem;
        ssl_certificate_key __INSTALL_DIR__/nginx/certs/privkey.pem;

        # ── TLS hardening ─────────────────────────────────────────────────────
        # TLS 1.2 is retained alongside 1.3 for compatibility with ISP field
        # equipment (MikroTik routers, older Android CPE clients) that do not
        # yet support TLS 1.3. Only AEAD ciphers are permitted on 1.2; weak
        # cipher suites (3DES, RC4, CBC-SHA) are explicitly excluded.
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;
        ssl_stapling              on;
        ssl_stapling_verify       on;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options           SAMEORIGIN                                     always;
        add_header X-Content-Type-Options    nosniff                                        always;
        add_header X-XSS-Protection          "1; mode=block"                                always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;

        # ── Proxy settings ────────────────────────────────────────────────────
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
        proxy_buffering        on;
        proxy_buffer_size      16k;
        proxy_buffers          8 16k;

        # ── WebSocket tunnel (FireRelay) ───────────────────────────────────────
        location /ws/firerelay {
            proxy_pass              http://app;
            proxy_http_version      1.1;
            proxy_set_header        Upgrade    $http_upgrade;
            proxy_set_header        Connection "upgrade";
            proxy_set_header        Host       $host;
            proxy_read_timeout      86400s;  # long-lived connection
            proxy_send_timeout      86400s;
        }

        # ── Auth endpoints — stricter rate limit ──────────────────────────────
        location ~ ^/api/v1/auth/ {
            limit_req zone=auth burst=20 nodelay;
            proxy_pass http://app;
        }

        # ── General API ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=120 nodelay;
            proxy_pass http://app;
        }

        # ── Health check (no rate limiting, no logging) ───────────────────────
        location /healthz {
            access_log off;
            proxy_pass http://app;
        }

        # ── Everything else (SPA + static assets served by Express) ──────────
        location / {
            proxy_pass http://app;
        }
    }
}
