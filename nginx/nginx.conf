# =============================================================================
# FireISP 5.0 — Nginx Reverse-Proxy Configuration
# Used by the nginx service in docker-compose.prod.yml
#
# Topology:
#   Internet → Nginx :80/:443 → app (upstream pool)
#
# Features:
#   • HTTP → HTTPS redirect (port 80)
#   • TLS 1.2/1.3 with hardened cipher list
#   • Upstream keep-alive to the Node.js app pool
#   • Gzip compression for text assets
#   • Security headers (HSTS, X-Frame-Options, CSP, …)
#   • WebSocket pass-through for /ws/firerelay
#   • Static-asset cache headers (frontend/dist served by Express)
#   • Rate limiting (burst tolerance for API calls)
# =============================================================================

# ── Worker / event model ─────────────────────────────────────────────────────
worker_processes      auto;
worker_rlimit_nofile  65535;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

# ── HTTP block ───────────────────────────────────────────────────────────────
http {
    # ── MIME types ────────────────────────────────────────────────────────────
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  1000;
    types_hash_max_size 4096;
    server_tokens       off;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/x-font-ttf image/svg+xml;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # General API: 60 req/s per IP (burst of 120, no delay up to 60)
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;
    # Auth endpoints: 10 req/s per IP
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;
    limit_req_status 429;

    # ── App upstream pool ─────────────────────────────────────────────────────
    upstream app {
        # Docker Compose service name resolves to all replicas via DNS round-robin.
        # Adjust server lines if you run a fixed number of named replicas.
        server app:3000;

        keepalive            32;
        keepalive_timeout    60s;
        keepalive_requests   1000;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen      80;
        listen      [::]:80;
        server_name _;

        # Docker / load-balancer liveness probe — returns 200 on plain HTTP so the
        # container is not marked unhealthy before TLS certificates are in place.
        location /healthz {
            access_log  off;
            return 200  "ok\n";
            add_header  Content-Type text/plain;
        }

        # Let's Encrypt / Certbot ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS virtual host ────────────────────────────────────────────────────
    server {
        listen      443 ssl http2;
        listen      [::]:443 ssl http2;
        server_name _;

        # ── TLS certificates ──────────────────────────────────────────────────
        # Mount your certificates into the container at these paths, or use
        # the certbot companion service (see docker-compose.prod.yml).
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # ── TLS hardening ─────────────────────────────────────────────────────
        # TLS 1.2 is retained alongside 1.3 for compatibility with ISP field
        # equipment (MikroTik routers, older Android CPE clients) that do not
        # yet support TLS 1.3. Only AEAD ciphers are permitted on 1.2; weak
        # cipher suites (3DES, RC4, CBC-SHA) are explicitly excluded.
        # Once your deployment no longer needs to support TLS-1.2-only clients,
        # change this line to: ssl_protocols TLSv1.3;
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;
        ssl_stapling              on;
        ssl_stapling_verify       on;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options           SAMEORIGIN                                     always;
        add_header X-Content-Type-Options    nosniff                                        always;
        add_header X-XSS-Protection          "1; mode=block"                                always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;

        # ── Proxy settings ────────────────────────────────────────────────────
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
        proxy_buffering        on;
        proxy_buffer_size      16k;
        proxy_buffers          8 16k;

        # ── WebSocket tunnel (FireRelay) ───────────────────────────────────────
        location /ws/firerelay {
            proxy_pass              http://app;
            proxy_http_version      1.1;
            proxy_set_header        Upgrade    $http_upgrade;
            proxy_set_header        Connection "upgrade";
            proxy_set_header        Host       $host;
            proxy_read_timeout      86400s;  # long-lived connection
            proxy_send_timeout      86400s;
        }

        # ── Auth endpoints — stricter rate limit ──────────────────────────────
        location ~ ^/api/v1/auth/ {
            limit_req zone=auth burst=20 nodelay;
            proxy_pass http://app;
        }

        # ── General API ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=120 nodelay;
            proxy_pass http://app;
        }

        # ── Health check (no rate limiting, no logging) ───────────────────────
        location /healthz {
            access_log off;
            proxy_pass http://app;
        }

        # ── Everything else (SPA + static assets served by Express) ──────────
        location / {
            proxy_pass http://app;
        }
    }
}
