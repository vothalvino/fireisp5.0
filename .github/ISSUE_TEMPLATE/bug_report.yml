---
name: Bug Report
description: Report a bug in FireISP 5.0
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages or logs if applicable.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: FireISP version
      description: Which version of FireISP are you running?
      placeholder: "5.0.0"
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Production
        - Staging
        - Development
        - Docker
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "18.x / 20.x / 22.x"
  - type: input
    id: mysql-version
    attributes:
      label: MySQL version
      placeholder: "8.0.x"
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context about the problem (screenshots, logs, config).
