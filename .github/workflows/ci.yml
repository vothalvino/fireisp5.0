name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src/

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Run tests with coverage
        run: npx jest --detectOpenHandles --forceExit --ci --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Check coverage threshold
        if: matrix.node-version == 22
        run: |
          COVERAGE=$(npx jest --detectOpenHandles --forceExit --ci --coverage --coverageReporters=json-summary 2>/dev/null && node -e "
            const s = require('./coverage/coverage-summary.json');
            const pct = s.total.lines.pct;
            console.log(pct);
          ")
          echo "Line coverage: ${COVERAGE}%"
          node -e "if (parseFloat('${COVERAGE}') < 70) { console.error('Coverage below 70% threshold'); process.exit(1); }"

      - name: Upload coverage report
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 14

      - name: Validate SQL schema
        run: |
          # Check that schema.sql is valid SQL (no syntax errors in CREATE TABLE statements)
          grep -c "CREATE TABLE" database/schema.sql
          # Ensure migration count matches expected
          MIGRATION_COUNT=$(ls database/migrations/*.sql | wc -l)
          echo "Found $MIGRATION_COUNT migrations"
          test "$MIGRATION_COUNT" -ge 100

      - name: Check migration numbering integrity
        if: matrix.node-version == 22
        run: |
          # Verify migrations are sequentially numbered with no gaps
          EXPECTED=1
          for f in $(ls database/migrations/*.sql | sort); do
            NUM=$(basename "$f" | sed 's/^0*//' | sed 's/_.*//')
            if [ "$NUM" != "$EXPECTED" ]; then
              echo "ERROR: Expected migration $EXPECTED but found $NUM ($f)"
              exit 1
            fi
            EXPECTED=$((EXPECTED + 1))
          done
          echo "All $((EXPECTED - 1)) migrations are sequentially numbered — no gaps"

  database-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: fireisp_test
          MYSQL_DATABASE: fireisp_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 --silent; do
            sleep 2
          done

      - name: Load schema
        run: mysql -h 127.0.0.1 -u root -pfireisp_test fireisp_test < database/schema.sql

      - name: Run SQL test suite
        run: |
          for f in tests/test_*.sql; do
            echo "=== Running $f ==="
            mysql -h 127.0.0.1 -u root -pfireisp_test fireisp_test < "$f"
          done
          echo "All SQL tests passed"

      - name: Verify migrations produce expected table count
        run: |
          # Create a fresh database and apply all migrations sequentially
          mysql -h 127.0.0.1 -u root -pfireisp_test -e "CREATE DATABASE IF NOT EXISTS fireisp_migrate_test;"
          for f in $(ls database/migrations/*.sql | sort); do
            mysql -h 127.0.0.1 -u root -pfireisp_test fireisp_migrate_test < "$f"
          done
          # Count tables and compare to schema.sql
          SCHEMA_TABLES=$(grep -c "CREATE TABLE" database/schema.sql)
          MIGRATED_TABLES=$(mysql -h 127.0.0.1 -u root -pfireisp_test -N -e \
            "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='fireisp_migrate_test' AND table_type='BASE TABLE';")
          echo "schema.sql declares $SCHEMA_TABLES tables, migrations created $MIGRATED_TABLES tables"
          if [ "$MIGRATED_TABLES" -lt "$SCHEMA_TABLES" ]; then
            echo "WARNING: Migration table count ($MIGRATED_TABLES) is less than schema.sql ($SCHEMA_TABLES)"
          fi

  migration-smoke-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: fireisp_smoke
          MYSQL_DATABASE: fireisp_smoke
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for MySQL
        env:
          MYSQL_PWD: fireisp_smoke
        run: |
          until mysqladmin ping -h 127.0.0.1 -u root --silent; do
            sleep 2
          done

      - name: Run migrations (production path)
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: fireisp_smoke
          DB_NAME: fireisp_smoke
        run: node src/scripts/migrate.js

      - name: Validate migrated schema
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: fireisp_smoke
          DB_NAME: fireisp_smoke
        run: node src/scripts/migration-smoke-test.js

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fireisp:${{ github.sha }} .

      - name: Verify Docker image runs
        run: |
          docker run --rm -d --name fireisp-test \
            -e NODE_ENV=production \
            -e JWT_SECRET=ci-test-secret-key-not-for-production-use-only \
            -e DB_HOST=localhost \
            -e DB_NAME=fireisp \
            -p 3000:3000 \
            fireisp:${{ github.sha }} || true
          sleep 3
          docker stop fireisp-test 2>/dev/null || true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          IMAGE_LOWER=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          docker tag fireisp:${{ github.sha }} "$IMAGE_LOWER:${{ github.sha }}"
          docker tag fireisp:${{ github.sha }} "$IMAGE_LOWER:latest"
          docker push "$IMAGE_LOWER:${{ github.sha }}"
          docker push "$IMAGE_LOWER:latest"
