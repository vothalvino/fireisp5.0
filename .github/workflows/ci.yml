name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src/

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Run tests with coverage
        run: npx jest --detectOpenHandles --forceExit --ci --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Upload coverage report
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 14

      - name: Validate SQL schema
        run: |
          # Check that schema.sql is valid SQL (no syntax errors in CREATE TABLE statements)
          grep -c "CREATE TABLE" database/schema.sql
          # Ensure migration count matches expected
          MIGRATION_COUNT=$(ls database/migrations/*.sql | wc -l)
          echo "Found $MIGRATION_COUNT migrations"
          test "$MIGRATION_COUNT" -ge 100

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fireisp:${{ github.sha }} .

      - name: Verify Docker image runs
        run: |
          docker run --rm -d --name fireisp-test \
            -e NODE_ENV=production \
            -e JWT_SECRET=ci-test-secret-key-not-for-production \
            -e DB_HOST=localhost \
            -p 3000:3000 \
            fireisp:${{ github.sha }} || true
          sleep 3
          docker stop fireisp-test 2>/dev/null || true
